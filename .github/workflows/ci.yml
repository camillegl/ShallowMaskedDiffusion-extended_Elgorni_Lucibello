name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - guthlac

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Import active package
        run: uv run python -c "import maskeddiffusion; print(maskeddiffusion.__file__)"

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: mypy
        run: uv run mypy src

      - name: pytest
        run: uv run pytest -q

      - name: Validate protected reference artifacts
        run: ./scripts/validate_reference_artifacts.sh

      - name: CLI --help checks
        run: |
          uv run maskeddiffusion-train --help
          uv run maskeddiffusion-sample --help
          uv run maskeddiffusion-evaluate --help
          uv run maskeddiffusion-uturn --help
          uv run maskeddiffusion-validate-artifact --help
          uv run maskeddiffusion-experiment --help
          uv run maskeddiffusion-p4c-analyze --help

      - name: Diff whitespace check
        # `git diff --check` with no range compares the working tree against
        # the index, which is always empty on a fresh CI checkout — it never
        # actually inspected the PR's committed changes. Compare the real
        # committed range instead: PR base...HEAD for pull_request events,
        # the pushed commit range for push events (falling back to the
        # single tip commit if `before` is the all-zero SHA, e.g. a branch's
        # first push, or if `before` is unreachable, e.g. a force-push that
        # rewrote history out from under it).
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            range="origin/${{ github.base_ref }}...HEAD"
          else
            before="${{ github.event.before }}"
            if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
              range="HEAD~1..HEAD"
            elif ! git cat-file -e "$before^{commit}" 2>/dev/null; then
              echo "before commit $before is unreachable (force-push rewrote history); falling back to HEAD~1..HEAD"
              range="HEAD~1..HEAD"
            else
              range="$before..${{ github.sha }}"
            fi
          fi
          echo "checking range: $range"
          git diff --check "$range"
