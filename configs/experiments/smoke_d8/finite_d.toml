# Tiny D=8 CPU smoke experiment — Phase 4C engine integration check only,
# not scientifically interpretable (docs/PHASE4C_EXPERIMENT_PROTOCOL.md).
# comparison_type = matched_seed_finite_size (docs/PHASE4C_EXPERIMENT_PROTOCOL.md
# §2a), NOT paired_disorder: arms share seed VALUES and ratios at different
# latent_dim, hence distinct-shape teachers with distinct teacher_id by
# construction. Never interpreted as a same-disorder comparison; excluded
# from analysis.statistics.paired_differences by default.

n_generate = 4

[experiment]
experiment_id = "smoke-d8-finite-d"
repeats = 1
base_seed = 20260721

[intervention]
name = "finite_d"
latent_dims = [8, 16]

[dimensions]
aspect_ratio = 2.0    # visible_dim = 16 / 32
sample_ratio = 3.0    # train_size = 24 / 48
# latent_dim comes from the intervention arms.

[model]
normalization = "explicit_sqrt_n"
v_policy = "frozen_zero"
bias_policy = "none"
diagonal_policy = "zero"

[training]
max_steps = 4
batch_size = 8
learning_rate = 1e-2
l2reg = 0.0
validation_size = 8
validation_every = 2
log_every = 1

[sampler]
sampler_name = "sequential_random_stochastic"
tokens_per_step = 1

[evaluation]
n_true = 8
lambdas = [4.0, 8.0]
