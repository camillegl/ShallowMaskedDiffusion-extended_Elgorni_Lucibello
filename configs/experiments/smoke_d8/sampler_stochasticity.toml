# Tiny D=8 CPU smoke experiment — Phase 4C engine integration check only,
# not scientifically interpretable (docs/PHASE4C_EXPERIMENT_PROTOCOL.md).
# Pair: stochastic versus corresponding greedy terminal law P_{θ,A,k}
# (same trained checkpoint distribution per arm; only the sampler differs).

n_generate = 4

[experiment]
experiment_id = "smoke-d8-sampler-stochasticity"
repeats = 1
base_seed = 20260721

[intervention]
name = "sampler_stochasticity"
sampler_family = "sequential_random"

[dimensions]
latent_dim = 8
aspect_ratio = 2.0    # visible_dim = 16
sample_ratio = 3.0    # train_size = 24

[model]
normalization = "explicit_sqrt_n"
v_policy = "frozen_zero"
bias_policy = "none"
diagonal_policy = "zero"

[training]
max_steps = 4
batch_size = 8
learning_rate = 1e-2
l2reg = 0.0
validation_size = 8
validation_every = 2
log_every = 1
# sampler_name comes from the intervention arms.

[evaluation]
n_true = 8
lambdas = [4.0, 8.0]
