# Tiny D=8 CPU smoke experiment — Phase 4C engine integration check only,
# not scientifically interpretable (docs/PHASE4C_EXPERIMENT_PROTOCOL.md).
# Pair: optimization budget — identical training at 2 versus 6 steps (the
# short trajectory is a prefix of the long one: same seeds throughout).

n_generate = 4

[experiment]
experiment_id = "smoke-d8-optimization-budget"
repeats = 1
base_seed = 20260721

[intervention]
name = "optimization_budget"
budgets = { short = 2, long = 6 }

[dimensions]
latent_dim = 8
aspect_ratio = 2.0    # visible_dim = 16
sample_ratio = 3.0    # train_size = 24

[model]
normalization = "explicit_sqrt_n"
v_policy = "frozen_zero"
bias_policy = "none"
diagonal_policy = "zero"

[training]
batch_size = 8
learning_rate = 1e-2
l2reg = 0.0
validation_size = 8
validation_every = 2
log_every = 1
# max_steps comes from the intervention budgets.

[sampler]
sampler_name = "sequential_random_stochastic"
tokens_per_step = 1

[evaluation]
n_true = 8
lambdas = [4.0, 8.0]
