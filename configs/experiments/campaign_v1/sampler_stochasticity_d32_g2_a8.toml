# Phase 4C campaign_v1 — sampler stochasticity (sequential_random), D=32, gamma=2, alpha=8
# 3 disorder repeats; paired arms share the full seed hierarchy
# (docs/PHASE4C_EXPERIMENT_PROTOCOL.md). Training settings are placeholders
# pending timing calibration (protocol §6); nothing here has been executed.
n_generate = 1000

[experiment]
experiment_id = "p4c-sampler-d32-g2-a8"
repeats = 3
base_seed = 218000

[intervention]
name = "sampler_stochasticity"
sampler_family = "sequential_random"

[dimensions]
latent_dim = 32
aspect_ratio = 2.0
sample_ratio = 8.0

[model]
normalization = "explicit_sqrt_n"
bias_policy = "none"
diagonal_policy = "zero"
v_policy = "frozen_zero"


[training]
batch_size = 64
learning_rate = 1e-2
l2reg = 0.0
validation_size = 200
validation_every = 100
log_every = 50
max_steps = 2000

[sampler]
# sampler_name comes from the intervention arms.
tokens_per_step = 1

[evaluation]
n_true = 1000
lambdas = [4.0, 8.0]
